# CircleCI Configuration — evez666-atlas
# Optimized for parallel Python + TypeScript CI with caching and test reporting.
version: 2.1

# ── Reusable executors ─────────────────────────────────────────────────────────
executors:
  node-executor:
    docker:
      - image: cimg/node:22.19
    working_directory: ~/project
    resource_class: medium

  python-executor:
    docker:
      - image: cimg/python:3.12
    working_directory: ~/project
    resource_class: medium

# ── Reusable commands ──────────────────────────────────────────────────────────
commands:
  restore-npm-cache:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-

  save-npm-cache:
    steps:
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  restore-pip-cache:
    steps:
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "requirements.txt" }}
            - pip-v1-

  save-pip-cache:
    steps:
      - save_cache:
          key: pip-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

# ── Jobs ───────────────────────────────────────────────────────────────────────
jobs:
  # ── TypeScript: install + type-check + test ──────────────────────────────────
  typescript-ci:
    executor: node-executor
    steps:
      - checkout
      - restore-npm-cache
      - run:
          name: Install Node dependencies
          command: npm ci --prefer-offline
      - save-npm-cache
      - run:
          name: TypeScript type-check
          command: npx tsc --noEmit
      - run:
          name: Build TypeScript
          command: npx tsc
      - run:
          name: Run TypeScript tests
          command: npx jest --ci --coverage --testPathPattern='src/'
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage
          destination: coverage-ts

  # ── Python: install + lint + test ────────────────────────────────────────────
  python-ci:
    executor: python-executor
    steps:
      - checkout
      - restore-pip-cache
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - save-pip-cache
      - run:
          name: Run Python tests
          command: |
            python -m pytest src/tests/python/ tests/ \
              --tb=short \
              --junitxml=test-results/pytest.xml \
              -v
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results-python

# ── Workflows ──────────────────────────────────────────────────────────────────
workflows:
  # Run both language CI jobs in parallel on every push to main (or any branch).
  ci:
    jobs:
      - typescript-ci:
          filters:
            branches:
              ignore:
                - /^dependabot\/.*/
      - python-ci:
          filters:
            branches:
              ignore:
                - /^dependabot\/.*/
