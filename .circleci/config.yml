# CircleCI configuration — optimized for parallelism, caching, and early feedback.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# ---------------------------------------------------------------------------
# Reusable executors
# ---------------------------------------------------------------------------
executors:
  node-executor:
    docker:
      - image: cimg/node:22.19
    resource_class: medium
    working_directory: ~/project

  python-executor:
    docker:
      - image: cimg/python:3.12
    resource_class: medium
    working_directory: ~/project

# ---------------------------------------------------------------------------
# Reusable commands
# ---------------------------------------------------------------------------
commands:
  restore-npm-cache:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-

  save-npm-cache:
    steps:
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  restore-pip-cache:
    steps:
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "requirements.txt" }}
            - pip-v1-

  save-pip-cache:
    steps:
      - save_cache:
          key: pip-v1-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # --- Node / TypeScript ---------------------------------------------------
  node-deps:
    executor: node-executor
    steps:
      - checkout
      - restore-npm-cache
      - run:
          name: Install Node dependencies
          command: npm ci --prefer-offline
      - save-npm-cache
      - persist_to_workspace:
          root: ~/project
          paths:
            - node_modules

  ts-build:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: TypeScript type-check & build
          command: npx tsc --noEmit
      - persist_to_workspace:
          root: ~/project
          paths:
            - dist

  ts-test:
    executor: node-executor
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - run:
          name: Run TypeScript / Jest tests
          command: npx jest --ci --coverage --coverageReporters=text-summary
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage
          destination: coverage

  # --- Python --------------------------------------------------------------
  python-deps:
    executor: python-executor
    steps:
      - checkout
      - restore-pip-cache
      - run:
          name: Install Python dependencies
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - save-pip-cache
      - persist_to_workspace:
          root: ~/project
          paths:
            - ~/.local/lib

  python-test:
    executor: python-executor
    parallelism: 2
    steps:
      - checkout
      - attach_workspace:
          at: ~/project
      - restore-pip-cache
      - run:
          name: Reinstall deps into current env
          command: pip install --quiet -r requirements.txt
      - run:
          name: Run Python tests (split across containers)
          command: |
            TEST_FILES=$(circleci tests glob "tests/*.py" "src/tests/python/*.py" \
              | circleci tests split --split-by=timings)
            python -m pytest $TEST_FILES -v \
              --junitxml=test-results/python/results.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

# ---------------------------------------------------------------------------
# Workflows
# ---------------------------------------------------------------------------
workflows:
  # Main pipeline — runs on every push
  ci:
    jobs:
      # Dependency installation runs in parallel for both languages
      - node-deps
      - python-deps

      # TypeScript build and test fan out from node-deps
      - ts-build:
          requires:
            - node-deps
      - ts-test:
          requires:
            - ts-build

      # Python tests fan out from python-deps
      - python-test:
          requires:
            - python-deps
